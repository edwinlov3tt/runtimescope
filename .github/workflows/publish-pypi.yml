# Publishes the Python SDK to PyPI on version tags.
# Uses only tag refs and build metadata — no untrusted user inputs in run: steps.
name: Publish Python SDK to PyPI

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/python-sdk
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build pytest

      - name: Install package with dev deps
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest

      - name: Build wheel + sdist
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/python-sdk/dist/
          skip-existing: true
          # Uses Trusted Publishing once configured at PyPI.
          # Until then, add PYPI_API_TOKEN secret and uncomment:
          # password: ${{ secrets.PYPI_API_TOKEN }}
