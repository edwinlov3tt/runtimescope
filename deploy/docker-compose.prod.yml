# Production docker-compose with Caddy reverse proxy for automatic HTTPS/WSS
# Use this for self-hosted VPS deployments (Hetzner, Linode, DigitalOcean Droplet, etc.)
#
# Setup:
#   1. Point your domain (e.g., runtimescope.yourcompany.com) to the server's IP
#   2. Edit this file and replace `runtimescope.example.com` with your domain
#   3. Generate a secure auth token:  openssl rand -hex 32
#   4. Set AUTH_TOKEN in .env or pass via -e
#   5. Run: docker compose -f deploy/docker-compose.prod.yml up -d
#
# Your DSN becomes:
#   runtimescopes://proj_xxx@runtimescope.yourcompany.com
#
# And the auth token is used server-side (configured in ~/.runtimescope/config.json on the volume).

services:
  collector:
    image: runtimescope/collector:latest
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "9090"   # WebSocket (internal, Caddy proxies)
      - "9091"   # HTTP API (internal, Caddy proxies)
    volumes:
      - runtimescope-data:/home/runtimescope/.runtimescope
    environment:
      - RUNTIMESCOPE_HOST=0.0.0.0
      - RUNTIMESCOPE_PORT=9090
      - RUNTIMESCOPE_HTTP_PORT=9091
      - RUNTIMESCOPE_BUFFER_SIZE=10000
      - RUNTIMESCOPE_RETENTION_DAYS=30
      - RUNTIMESCOPE_AUTH_TOKEN=${AUTH_TOKEN:?AUTH_TOKEN is required — set it in .env or env var}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:9091/api/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 3s
      start_period: 5s
      retries: 3
    networks:
      - rs-internal

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - collector
    networks:
      - rs-internal

networks:
  rs-internal:
    driver: bridge

volumes:
  runtimescope-data:
  caddy-data:
  caddy-config:
