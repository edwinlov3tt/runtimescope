services:
  collector:
    build: .
    ports:
      - "9090:9090"  # WebSocket collector
      - "9091:9091"  # HTTP API + POST event ingestion
    volumes:
      - runtimescope-data:/home/runtimescope/.runtimescope
    environment:
      - RUNTIMESCOPE_HOST=0.0.0.0
      - RUNTIMESCOPE_PORT=9090
      - RUNTIMESCOPE_HTTP_PORT=9091
      - RUNTIMESCOPE_BUFFER_SIZE=10000
      - RUNTIMESCOPE_RETENTION_DAYS=30
      # Auth is configured via ~/.runtimescope/config.json in the volume.
      # See docs for how to generate API keys.
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:9091/api/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 3s
      start_period: 5s
      retries: 3

volumes:
  runtimescope-data:
